name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Find and Build Android Project
        run: |
          # Ищем, где лежит gradlew, заходим туда и собираем
          GRADLEW_PATH=$(find . -name gradlew -maxdepth 2 | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Файл gradlew не найден! Проверяем корень..."
            chmod +x gradlew && ./gradlew assembleDebug
          else
            DIR_PATH=$(dirname "$GRADLEW_PATH")
            echo "Проект найден в папке: $DIR_PATH"
            cd "$DIR_PATH"
            chmod +x gradlew
            ./gradlew assembleDebug
            # Переносим готовый APK в корень, чтобы шаг загрузки его нашел
            mkdir -p ../app/build/outputs/apk/debug/
            cp app/build/outputs/apk/debug/app-debug.apk ../app/build/outputs/apk/debug/ 2>/dev/null || cp build/outputs/apk/debug/app-debug.apk ../app/build/outputs/apk/debug/ 2>/dev/null || true
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/app-debug.apk"
          
