name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build with System Gradle
        run: |
          # Ищем, в какой папке лежит build.gradle
          GRADLE_DIR=$(find . -name "build.gradle*" -not -path "*/app/*" | head -n 1)
          if [ -z "$GRADLE_DIR" ]; then
            # Если проект в корне
            gradle assembleDebug
          else
            DIR_PATH=$(dirname "$GRADLE_DIR")
            cd "$DIR_PATH"
            gradle assembleDebug
            mkdir -p ../app/build/outputs/apk/debug/
            cp app/build/outputs/apk/debug/app-debug.apk ../app/build/outputs/apk/debug/ 2>/dev/null || cp build/outputs/apk/debug/app-debug.apk ../app/build/outputs/apk/debug/ 2>/dev/null || true
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/app-debug.apk"
          
